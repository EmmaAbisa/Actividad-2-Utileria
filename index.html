<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utilería · Formulario de registro</title>
  <link rel="stylesheet" href="css/Utileria.css" />
</head>
<body>
  <div class="wrap">
    <nav class="crumbs"><a href="index.html">Formulario</a> · <a href="login.html">Login</a></nav>

    <div class="brand">
      <span class="tag">Utilería.js</span>
    </div>
    <h1>Registro de usuario</h1>

    <form id="formulario" class="panel" novalidate>

      <div class="campo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="María José Pérez" autocomplete="off" />
        <div class="error-msg" id="err-nombre"></div>
      </div>

      <div class="campo">
        <label for="correo">Correo electrónico</label>
        <input type="text" id="correo" placeholder="maria@ejemplo.com" autocomplete="off" />
        <div class="error-msg" id="err-correo"></div>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono (máx. 10 dígitos)</label>
        <input type="text" id="telefono" placeholder="9511234567" autocomplete="off" />
        <div class="error-msg" id="err-telefono"></div>
      </div>

      <div class="campo">
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" />
        <div class="error-msg" id="err-fecha"></div>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="off" />
        <div class="error-msg" id="err-password"></div>
      </div>
  <p>Valida</p>
      <button type="submit" class="boton-enviar">Crear cuenta</button>
    </form>

    <footer></footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <span class="tag"></span>
      <p class="modal-edad" id="modalEdadValor"></p>
      <p class="detalle" id="modalDetalle"> SOlo cierra </p>

      <button type="button" id="cerrarModal" class="boton-enviar">Continuar</button>
    </div>
  </div>

  <script src="js/Utileria.js"></script>
  <script src="js/formulario.js"></script>
</body>
</html>
